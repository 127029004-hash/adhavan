# Netlify configuration
[build]
  publish = "."
  # No build step — site is static HTML.

# Make sure JSON content files are served fresh
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Long-cache the main HTML for fast loads, but allow revalidation
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
