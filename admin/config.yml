# Decap CMS configuration for Make Your Datz Photography
# Edit `repo` below to match the GitHub repository you push this site to.

backend:
  name: git-gateway
  branch: main           # change if your default branch is different

# Cloudinary as the media library — replace cloud_name + upload preset
# with values from your Cloudinary dashboard (see README-DEPLOY.md).
media_library:
  name: cloudinary
  config:
    cloud_name: dl1kerxwy
    api_key: 829334352775879       # public/unsigned key only
    default_transformations:
      - - fetch_format: auto
          quality: auto

# Files are written back to the repo so the website can fetch them.
media_folder: "uploads"           # local fallback if media_library is not used
public_folder: "/uploads"

publish_mode: simple

site_url: https://example.com
display_url: https://example.com
logo_url: /favicon.ico

collections:
  - name: gallery
    label: "Photo Gallery"
    description: "All photos shown in the Portfolio section. Drag to reorder."
    files:
      - file: "content/gallery.json"
        label: "Gallery items"
        name: "items"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} — {{fields.category}}"
            allow_add: true
            collapsed: true
            fields:
              - { label: "Image", name: "image", widget: "image", media_library: { config: { multiple: false } } }
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Category", name: "category", widget: "select",
                  options:
                    - { label: "Wedding & Pre-Wedding", value: "wedding" }
                    - { label: "Child", value: "child" }
                    - { label: "Portrait", value: "portrait" }
                }
              - { label: "Label (shown on hover)", name: "label", widget: "string", required: false }
              - { label: "Display order", name: "order", widget: "number", required: false, value_type: "int", min: 0, hint: "Lower numbers appear first. Items without a number go last." }

  - name: videos
    label: "Videos"
    description: "Videography reels. First 4 (by order) appear in the homepage featured grid; all appear in the Videos page."
    files:
      - file: "content/videos.json"
        label: "Video items"
        name: "items"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            allow_add: true
            collapsed: true
            fields:
              - { label: "Video file (MP4)", name: "video", widget: "file",
                  media_library: { config: { resource_type: "video", multiple: false } } }
              - { label: "Poster image (optional)", name: "poster", widget: "image", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Meta (e.g. 'Wedding Film · 2025')", name: "meta", widget: "string", required: false }
              - { label: "Display order", name: "order", widget: "number", required: false, value_type: "int", min: 0 }
